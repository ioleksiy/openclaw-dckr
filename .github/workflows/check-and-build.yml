name: Build Patched OpenClaw

on:
  schedule:
    - cron: '0 */4 * * *' 
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenClaw version tag to build (for example: v1.0.0). Leave empty to use latest stable upstream package tag.'
        required: false
        type: string
      isLatest:
        description: 'Also publish :latest and :latest-slim tags for this manual run.'
        required: false
        type: boolean
        default: false
      force_rebuild:
        description: 'Build even when the image tag already exists in GHCR.'
        required: false
        type: boolean
        default: false
      skip_1password:
        description: 'Skip 1Password CLI installation layer'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version to build
        id: release
        run: |
          REQUESTED_TAG="${{ github.event.inputs.version }}"
          TAG=""

          if [ -n "$REQUESTED_TAG" ]; then
            TAG="$REQUESTED_TAG"
            echo "Using manually requested version: $TAG"
          else
            # GHCR tag listing now requires a bearer token, even for public packages.
            GHCR_TOKEN=$(curl -fsSL "https://ghcr.io/token?scope=repository:openclaw/openclaw:pull" | jq -r '.token // empty')
            if [ -n "$GHCR_TOKEN" ]; then
              TAG=$(curl -fsSL -H "Authorization: Bearer $GHCR_TOKEN" "https://ghcr.io/v2/openclaw/openclaw/tags/list?n=1000" \
                | jq -r '.tags[]?' \
                | grep -Evi '(alpha|beta|rc|preview)' \
                | grep -E '^v?[0-9]+(\.[0-9]+){1,3}$' \
                | sort -V \
                | tail -n 1)
            fi

            # Fallback to git tags if GHCR lookup fails or returns no valid stable tag.
            if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
              TAG=$(curl -fsSL \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/openclaw/openclaw/tags?per_page=100" \
                | jq -r '.[].name?' \
                | grep -Evi '(alpha|beta|rc|preview)' \
                | grep -E '^v?[0-9]+(\.[0-9]+){1,3}$' \
                | sort -V \
                | tail -n 1)
            fi

            echo "Using latest stable upstream package tag: $TAG"
          fi

          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "Failed to resolve an OpenClaw version tag" >&2
            exit 1
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Validate package tag
        id: package_tag
        run: |
          TAG="${{ steps.release.outputs.tag }}"

          # Check the tag we will actually publish as a package/image tag.
          if echo "$TAG" | grep -Eqi '(beta|alpha|rc|preview)'; then
            echo "Pre-release package tag is not allowed: $TAG" >&2
            exit 1
          fi

          if ! echo "$TAG" | grep -Eq '^v?[0-9]+(\.[0-9]+){1,3}$'; then
            echo "Invalid package tag format: $TAG" >&2
            echo "Expected examples: v1.0.0, 1.0.0, v1.2.3" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Resolve source ref for checkout
        id: source_ref
        run: |
          TAG="${{ steps.package_tag.outputs.tag }}"

          ALT_TAG=""
          if echo "$TAG" | grep -Eq '^v'; then
            ALT_TAG="${TAG#v}"
          else
            ALT_TAG="v$TAG"
          fi

          check_git_tag_ref() {
            local candidate="$1"
            curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/openclaw/openclaw/git/ref/tags/$candidate"
          }

          STATUS_PRIMARY=$(check_git_tag_ref "$TAG")
          STATUS_ALT=$(check_git_tag_ref "$ALT_TAG")

          if [ "$STATUS_PRIMARY" = "200" ]; then
            SOURCE_REF="$TAG"
          elif [ "$STATUS_ALT" = "200" ]; then
            SOURCE_REF="$ALT_TAG"
          else
            echo "No matching upstream git tag found for $TAG (also checked $ALT_TAG)" >&2
            exit 1
          fi

          echo "Using source checkout ref: $SOURCE_REF"
          echo "ref=$SOURCE_REF" >> "$GITHUB_OUTPUT"

      - name: Check if images already exist
        id: check
        run: |
          FORCE_REBUILD="${{ github.event.inputs.force_rebuild }}"
          TAG="${{ steps.package_tag.outputs.tag }}"
          WANT_LATEST=false

          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event.inputs.isLatest }}" == "true" ]]; then
            WANT_LATEST=true
          fi

          if [ "$FORCE_REBUILD" = "true" ]; then
            echo "full_exists=false" >> $GITHUB_OUTPUT
            echo "slim_exists=false" >> $GITHUB_OUTPUT
            echo "Force rebuild enabled, will build full and slim variants"
            exit 0
          fi

          ALT_TAG=""
          if echo "$TAG" | grep -Eq '^v'; then
            ALT_TAG="${TAG#v}"
          else
            ALT_TAG="v$TAG"
          fi

          GHCR_SCOPE="repository:${{ env.IMAGE_NAME }}:pull"
          GHCR_TOKEN=$(curl -fsSL "https://ghcr.io/token?scope=$GHCR_SCOPE" | jq -r '.token // empty')

          # Fallback for registries/packages that require authenticated token exchange.
          if [ -z "$GHCR_TOKEN" ]; then
            GHCR_TOKEN=$(curl -fsSL \
              -u "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
              "https://ghcr.io/token?scope=$GHCR_SCOPE" | jq -r '.token // empty')
          fi

          if [ -z "$GHCR_TOKEN" ]; then
            echo "Failed to obtain GHCR bearer token for scope: $GHCR_SCOPE" >&2
            exit 1
          fi

          check_manifest_tag() {
            local candidate="$1"
            curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $GHCR_TOKEN" \
              -H "Accept: application/vnd.oci.image.index.v1+json, application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.list.v2+json, application/vnd.docker.distribution.manifest.v2+json" \
              "https://ghcr.io/v2/${{ env.IMAGE_NAME }}/manifests/$candidate"
          }

          get_manifest_digest() {
            local candidate="$1"
            curl -sI \
              -H "Authorization: Bearer $GHCR_TOKEN" \
              -H "Accept: application/vnd.oci.image.index.v1+json, application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.list.v2+json, application/vnd.docker.distribution.manifest.v2+json" \
              "https://ghcr.io/v2/${{ env.IMAGE_NAME }}/manifests/$candidate" \
              | tr -d '\r' \
              | awk -F': ' 'tolower($1)=="docker-content-digest" {print $2}' \
              | tail -n 1
          }

          FULL_EXISTS=false
          SLIM_EXISTS=false

          STATUS_FULL_PRIMARY=$(check_manifest_tag "$TAG")
          STATUS_FULL_ALT=$(check_manifest_tag "$ALT_TAG")

          # Treat existing unsuffixed full tag as full image presence.
          if [ "$STATUS_FULL_PRIMARY" = "200" ] || [ "$STATUS_FULL_ALT" = "200" ]; then
            FULL_EXISTS=true
          fi

          STATUS_SLIM_PRIMARY=$(check_manifest_tag "$TAG-slim")
          STATUS_SLIM_ALT=$(check_manifest_tag "$ALT_TAG-slim")
          STATUS_LATEST=$(check_manifest_tag "latest")
          STATUS_LATEST_SLIM=$(check_manifest_tag "latest-slim")

          echo "Check status full: $TAG=$STATUS_FULL_PRIMARY, $ALT_TAG=$STATUS_FULL_ALT"
          echo "Check status slim: $TAG-slim=$STATUS_SLIM_PRIMARY, $ALT_TAG-slim=$STATUS_SLIM_ALT"
          if [ "$WANT_LATEST" = "true" ]; then
            echo "Check status latest aliases: latest=$STATUS_LATEST, latest-slim=$STATUS_LATEST_SLIM"
          fi

          if [ "$STATUS_SLIM_PRIMARY" = "200" ] || [ "$STATUS_SLIM_ALT" = "200" ]; then
            SLIM_EXISTS=true
          fi

          # For schedule/manual-latest runs, require latest aliases to exist too.
          if [ "$WANT_LATEST" = "true" ]; then
            if [ "$STATUS_LATEST" != "200" ]; then
              FULL_EXISTS=false
            fi

            if [ "$STATUS_LATEST_SLIM" != "200" ]; then
              SLIM_EXISTS=false
            fi

            TAG_DIGEST=""
            if [ "$STATUS_FULL_PRIMARY" = "200" ]; then
              TAG_DIGEST=$(get_manifest_digest "$TAG")
            elif [ "$STATUS_FULL_ALT" = "200" ]; then
              TAG_DIGEST=$(get_manifest_digest "$ALT_TAG")
            fi

            LATEST_DIGEST=""
            if [ "$STATUS_LATEST" = "200" ]; then
              LATEST_DIGEST=$(get_manifest_digest "latest")
            fi

            if [ -n "$TAG_DIGEST" ] && [ -n "$LATEST_DIGEST" ] && [ "$TAG_DIGEST" != "$LATEST_DIGEST" ]; then
              echo "latest digest differs from target tag digest, will refresh latest"
              FULL_EXISTS=false
            fi

            SLIM_TAG_DIGEST=""
            if [ "$STATUS_SLIM_PRIMARY" = "200" ]; then
              SLIM_TAG_DIGEST=$(get_manifest_digest "$TAG-slim")
            elif [ "$STATUS_SLIM_ALT" = "200" ]; then
              SLIM_TAG_DIGEST=$(get_manifest_digest "$ALT_TAG-slim")
            fi

            LATEST_SLIM_DIGEST=""
            if [ "$STATUS_LATEST_SLIM" = "200" ]; then
              LATEST_SLIM_DIGEST=$(get_manifest_digest "latest-slim")
            fi

            if [ -n "$SLIM_TAG_DIGEST" ] && [ -n "$LATEST_SLIM_DIGEST" ] && [ "$SLIM_TAG_DIGEST" != "$LATEST_SLIM_DIGEST" ]; then
              echo "latest-slim digest differs from target slim tag digest, will refresh latest-slim"
              SLIM_EXISTS=false
            fi
          fi

          echo "full_exists=$FULL_EXISTS" >> $GITHUB_OUTPUT
          echo "slim_exists=$SLIM_EXISTS" >> $GITHUB_OUTPUT

          if [ "$FULL_EXISTS" = "true" ]; then
            echo "Full image already exists for tag: $TAG (or $ALT_TAG)"
          else
            echo "Full image not found for tag: $TAG (also checked $ALT_TAG)"
          fi

          if [ "$SLIM_EXISTS" = "true" ]; then
            echo "Slim image already exists for tag: $TAG-slim (or $ALT_TAG-slim)"
          else
            echo "Slim image not found for tag: $TAG-slim (also checked $ALT_TAG-slim)"
          fi

      - name: Prepare full image tags
        id: full_tags
        if: steps.check.outputs.full_exists == 'false'
        run: |
          IMAGE_BASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          TAG="${{ steps.package_tag.outputs.tag }}"
          IS_LATEST=false

          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event.inputs.isLatest }}" == "true" ]]; then
            IS_LATEST=true
          fi

          {
            echo "image_tags<<EOF"
            echo "$IMAGE_BASE:$TAG"

            if [ "$IS_LATEST" = "true" ]; then
              echo "$IMAGE_BASE:latest"
            fi

            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare slim image tags
        id: slim_tags
        if: steps.check.outputs.slim_exists == 'false'
        run: |
          IMAGE_BASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          TAG="${{ steps.package_tag.outputs.tag }}"
          IS_LATEST=false

          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event.inputs.isLatest }}" == "true" ]]; then
            IS_LATEST=true
          fi

          {
            echo "image_tags<<EOF"
            echo "$IMAGE_BASE:$TAG-slim"

            if [ "$IS_LATEST" = "true" ]; then
              echo "$IMAGE_BASE:latest-slim"
            fi

            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout OpenClaw source
        if: steps.check.outputs.full_exists == 'false' || steps.check.outputs.slim_exists == 'false'
        uses: actions/checkout@v4
        with:
          repository: openclaw/openclaw
          ref: ${{ steps.source_ref.outputs.ref }}

      - name: Log in to GHCR
        if: steps.check.outputs.full_exists == 'false' || steps.check.outputs.slim_exists == 'false'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.check.outputs.full_exists == 'false' || steps.check.outputs.slim_exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build and push full image
        if: steps.check.outputs.full_exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.full_tags.outputs.image_tags }}
          build-args: |
            OPENCLAW_INSTALL_BROWSER=1
            OPENCLAW_DOCKER_APT_PACKAGES=socat
          cache-from: type=gha,scope=full
          cache-to: type=gha,mode=max,scope=full

      - name: Build and push slim image
        if: steps.check.outputs.slim_exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.slim_tags.outputs.image_tags }}
          build-args: |
            OPENCLAW_INSTALL_BROWSER=0
          cache-from: type=gha,scope=slim
          cache-to: type=gha,mode=max,scope=slim

      - name: Add 1Password CLI layer (full)
        if: steps.check.outputs.full_exists == 'false' && github.event.inputs.skip_1password != 'true'
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.package_tag.outputs.tag }}"
          cat > /tmp/Dockerfile.1password << 'EOF'
          ARG BASE_IMAGE
          FROM ${BASE_IMAGE}
          RUN curl -sS https://downloads.1password.com/linux/keys/1password.asc | \
              gpg --dearmor > /usr/share/keyrings/1password-archive-keyring.gpg && \
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/1password-archive-keyring.gpg] https://downloads.1password.com/linux/debian/$(dpkg --print-architecture) stable main" > /etc/apt/sources.list.d/1password.list && \
              apt-get update && \
              apt-get install -y --no-install-recommends 1password-cli && \
              rm -rf /var/lib/apt/lists/*
          EOF
          docker build --build-arg BASE_IMAGE=$IMAGE -f /tmp/Dockerfile.1password -t $IMAGE .
          docker push $IMAGE

      - name: Add 1Password CLI layer (slim)
        if: steps.check.outputs.slim_exists == 'false' && github.event.inputs.skip_1password != 'true'
        run: |
          SLIM_TAG="${{ steps.package_tag.outputs.tag }}-slim"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SLIM_TAG}"
          docker build --build-arg BASE_IMAGE=$IMAGE -f /tmp/Dockerfile.1password -t $IMAGE .
          docker push $IMAGE

      - name: Output image details
        if: success()
        run: |
          TAG="${{ steps.package_tag.outputs.tag }}"
          IMAGE_BASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IS_LATEST=false

          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event.inputs.isLatest }}" == "true" ]]; then
            IS_LATEST=true
          fi

          echo "### :rocket: Image workflow completed successfully!" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tag:** \`$TAG\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Also tagged as latest:** \`$IS_LATEST\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ steps.check.outputs.full_exists }}" = "true" ]; then
            echo "**Full image:** already existed, no rebuild needed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Full image:** \`$IMAGE_BASE:$TAG\`" >> "$GITHUB_STEP_SUMMARY"
            if [ "$IS_LATEST" = "true" ]; then
              echo "**Also available as:** \`$IMAGE_BASE:latest\`" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ steps.check.outputs.slim_exists }}" = "true" ]; then
            echo "**Slim image:** already existed, no rebuild needed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Slim image:** \`$IMAGE_BASE:$TAG-slim\`" >> "$GITHUB_STEP_SUMMARY"
            if [ "$IS_LATEST" = "true" ]; then
              echo "**Also available as:** \`$IMAGE_BASE:latest-slim\`" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Platforms:** linux/amd64, linux/arm64" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Pull the image:" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull $IMAGE_BASE:$TAG" >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull $IMAGE_BASE:$TAG-slim" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Slack (Success)
        if: success() && env.SLACK_WEBHOOK_URL != '' && (steps.check.outputs.full_exists == 'false' || steps.check.outputs.slim_exists == 'false')
        uses: slackapi/slack-github-action@v2.0.0
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          webhook: ${{ env.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ OpenClaw Docker Build Successful",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "✅ OpenClaw Docker Build Successful",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Version:*\n`${{ steps.package_tag.outputs.tag }}`"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Latest:*\n`${{ github.event_name == 'schedule' || github.event.inputs.isLatest == 'true' }}`"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Image:*\n`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.package_tag.outputs.tag }}`"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Build Logs>"
                    }
                  ]
                }
              ]
            }

      - name: Notify Slack (Failure)
        if: failure() && env.SLACK_WEBHOOK_URL != '' && (steps.check.outputs.full_exists == 'false' || steps.check.outputs.slim_exists == 'false')
        uses: slackapi/slack-github-action@v2.0.0
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          webhook: ${{ env.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ OpenClaw Docker Build Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ OpenClaw Docker Build Failed",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Version:*\n`${{ steps.package_tag.outputs.tag }}`"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Triggered by:*\n`${{ github.actor }}`"
                    }
                  ]
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "⚠️ <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Build Logs to debug>"
                    }
                  ]
                }
              ]
            }
